name: Sync Fork

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Sync Fork without workflow file changes
        run: |
          git remote add upstream https://github.com/promptfoo/promptfoo.git || true
          git fetch origin main
          git fetch upstream main

          git checkout main
          git merge upstream/main --no-edit

          # Keep our fork's existing workflow files
          git restore --source=origin/main --staged --worktree .github/workflows || true

          # Commit only if restoring workflows changed the merge result
          git add .github/workflows
          git diff --cached --quiet || git commit --amend --no-edit

          git push origin main
