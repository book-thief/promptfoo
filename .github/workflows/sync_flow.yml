name: Sync Fork

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Sync Fork
        run: |
          git remote add upstream https://github.com/promptfoo/promptfoo.git || true
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit
          git push origin main
