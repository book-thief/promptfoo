name: Sync Fork

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Sync Fork without workflow file changes
        run: |
          git remote add upstream https://github.com/promptfoo/promptfoo.git || true
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit

          # Remove any merged changes under .github/workflows
          git restore --source=HEAD --staged --worktree .github/workflows || true

          # Push only non-workflow changes
          git push origin HEAD:main
